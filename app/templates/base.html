<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SMS 발송 시스템{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token(request) }}">
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; font-size: 14px; }

    /* Nav */
    .nav { background: #1a1a2e; color: #fff; display: flex; align-items: center; padding: 0 1.5rem; height: 52px; gap: 1.5rem; position: sticky; top: 0; z-index: 100; }
    .nav-brand a { color: #fff; text-decoration: none; font-weight: 700; font-size: 16px; }
    .nav-links { display: flex; gap: 0.25rem; flex: 1; }
    .nav-links a { color: #ccc; text-decoration: none; padding: 0.4rem 0.75rem; border-radius: 4px; }
    .nav-links a:hover, .nav-links a.active { background: #16213e; color: #fff; }
    .nav-dropdown { position: relative; }
    .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; min-width: 160px; z-index: 200; }
    .nav-dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a { display: block; color: #ccc; padding: 0.5rem 1rem; }
    .dropdown-menu a:hover { background: #16213e; color: #fff; }
    .nav-user { color: #aaa; display: flex; align-items: center; gap: 0.75rem; margin-left: auto; font-size: 13px; }
    .btn-link { background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; text-decoration: underline; }
    .btn-link:hover { color: #fff; }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.25rem; color: #111; }

    /* Cards */
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #333; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 1rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 700; color: #2563eb; }
    .stat-label { font-size: 12px; color: #666; margin-top: 0.25rem; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f0f0f0; text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #ddd; font-weight: 600; color: #444; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:hover td { background: #f0f4ff; }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.35rem; color: #333; font-size: 13px; }
    .form-group input[type=text],
    .form-group input[type=password],
    .form-group input[type=url],
    .form-group select,
    .form-group textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit; }
    .form-group textarea { resize: vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: 2px solid #2563eb; border-color: #2563eb; }
    .form-hint { font-size: 12px; color: #888; margin-top: 0.25rem; }

    /* Buttons */
    .btn { display: inline-block; padding: 0.5rem 1.25rem; border-radius: 4px; border: 1px solid transparent; cursor: pointer; font-size: 14px; font-family: inherit; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #333; border-color: #ccc; }
    .btn-secondary:hover { background: #f0f0f0; }
    .btn-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 12px; }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }

    /* Status badges */
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    .badge-pending { background: #fef9c3; color: #713f12; }
    .badge-dispatched { background: #dbeafe; color: #1e40af; }
    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-failed { background: #fee2e2; color: #991b1b; }
    .badge-partial { background: #ffedd5; color: #9a3412; }

    /* Alerts */
    .alert { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: 13px; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .alert-warning { background: #fef9c3; color: #713f12; border: 1px solid #fde047; }

    /* HTMX feedback */
    .ok { color: #166534; font-weight: 600; }
    .err { color: #991b1b; font-weight: 600; }
    .warn { color: #713f12; font-weight: 600; }

    /* Progress bar */
    .progress-bar { background: #e5e7eb; border-radius: 4px; height: 12px; overflow: hidden; }
    .progress-fill { background: #2563eb; height: 100%; transition: width 0.3s; }

    /* Pagination */
    .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; }
    .pagination a { padding: 0.35rem 0.75rem; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; color: #333; font-size: 13px; }
    .pagination a.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .pagination a:hover:not(.active) { background: #f0f0f0; }

    /* HTMX indicator */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Misc */
    .text-muted { color: #888; font-size: 12px; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .flex { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .mono { font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  {% set user_name = request.session.get("user_name", "") if request.session is defined else "" %}
  {% set user_roles = user_roles if user_roles is defined else [] %}
  {% if user_name %}
    {% include "_layout/nav.html" %}
  {% endif %}

  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    // CSRF 토큰을 모든 HTMX 요청에 자동 추가
    document.body.addEventListener('htmx:configRequest', function(evt) {
      var token = document.querySelector('meta[name="csrf-token"]');
      if (token) { evt.detail.headers['X-CSRF-Token'] = token.content; }
    });
    // HTMX는 기본적으로 4xx/5xx 응답을 swap하지 않아 사용자에게 안 보임.
    // 응답 본문이 있는 에러는 표시하도록 swap 강제 (디버깅 + UX 양쪽 도움).
    document.body.addEventListener('htmx:beforeSwap', function(evt) {
      if (evt.detail.xhr.status >= 400) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
      }
    });
  </script>
</body>
</html>

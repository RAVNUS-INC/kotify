{# 공통 페이지네이션 컴포넌트
   변수: page, total_pages, extra_qs (선택, "?sort=foo&order=asc" 형태의 추가 쿼리)
#}
{% if total_pages > 1 %}
<div style="padding:10px 16px;border-top:1px solid var(--border)">
  <div class="pagination">
    {% if page > 1 %}
    <a href="?page={{ page - 1 }}{{ extra_qs or '' }}">← 이전</a>
    {% endif %}
    <span class="text-muted">{{ page }} / {{ total_pages }}</span>
    {% if page < total_pages %}
    <a href="?page={{ page + 1 }}{{ extra_qs or '' }}">다음 →</a>
    {% endif %}
  </div>
</div>
{% endif %}

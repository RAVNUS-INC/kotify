<nav class="nav">
  <div class="nav-brand"><a href="/">📱 SMS 발송 시스템</a></div>
  <div class="nav-links">
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>대시보드</a>
    {% if "sender" in user_roles or "admin" in user_roles %}
    <a href="/compose" {% if request.url.path == "/compose" %}class="active"{% endif %}>새 발송</a>
    {% endif %}
    <a href="/campaigns" {% if request.url.path.startswith("/campaigns") %}class="active"{% endif %}>발송 이력</a>
    {% if "admin" in user_roles %}
    <div class="nav-dropdown">
      <a href="/admin/settings" {% if request.url.path.startswith("/admin") %}class="active"{% endif %}>관리 ▾</a>
      <div class="dropdown-menu">
        <a href="/admin/settings">시스템 설정</a>
        <a href="/admin/callers">발신번호 관리</a>
        <a href="/admin/audit">감사 로그</a>
      </div>
    </div>
    {% endif %}
  </div>
  <div class="nav-user">
    <span>{{ user_name }}</span>
    <form action="/auth/logout" method="post" style="display:inline">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <button type="submit" class="btn-link">로그아웃</button>
    </form>
  </div>
</nav>

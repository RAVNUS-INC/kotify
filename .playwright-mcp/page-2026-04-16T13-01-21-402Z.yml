              - paragraph [ref=e64]:
                - strong [ref=e65]: SMS, 카카오톡, RCS, 앱푸시
                - text: 등 다양한 메시지 채널을 통합하여, 단일 플랫폼에서 메시지 발송부터 수신 결과 분석까지 전 과정을 일원화해 제공합니다. RESTful API를 통해 기업 고객은 소비자 단말기에 A2P 메시지를 다양한 채널로 손쉽게 연동 및 전송할 수 있습니다.

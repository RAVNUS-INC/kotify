                    - text: SMS/LMS/MMS, RCS, 카카오 알림톡·친구톡, 앱 푸시 등 다양한 채널을 통합하여 메시지를 발송할 수 있습니다.
                - listitem [ref=e74]:
                  - paragraph [ref=e75]:
                    - strong [ref=e76]: MO(Message Originating) 수신 기능
                    - text: 대표번호를 통해 수신된 SMS/LMS/MMS 메시지를 수집하고 처리할 수 있습니다.
                - listitem [ref=e77]:
